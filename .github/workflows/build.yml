name: Build Headpat Server

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyserial python-osc pyinstaller

      - name: Inject version from tag
        run: |
          $tag = if ("${{ github.ref_name }}" -match "^v") { "${{ github.ref_name }}" } else { "v0.0.0-dev" }
          $ver = $tag.TrimStart('v')
          (Get-Content heatpett_server.py) `
            -replace 'SERVER_VERSION\s*=\s*"[^"]*"', "SERVER_VERSION = `"$tag`"" |
            Set-Content heatpett_server.py
          (Get-Content installer.iss) `
            -replace '#define MyAppVersion "[^"]*"', "#define MyAppVersion `"$ver`"" |
            Set-Content installer.iss

      - name: Build exe with PyInstaller
        run: pyinstaller --onefile --windowed --icon=icon.ico --name="Headpat Server" heatpett_server.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeadpatServer-Setup-Windows
          path: dist_installer\*.exe

      - name: Create Release (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Headpat Server ${{ github.ref_name }}
          files: dist_installer\*.exe
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get install -y python3-tk libfuse2

      - name: Install Python dependencies
        run: pip install pyserial python-osc pyinstaller

      - name: Inject version from tag
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^v ]]; then VERSION="$TAG"; else VERSION="v0.0.0-dev"; fi
          sed -i "s/SERVER_VERSION\s*=\s*\"[^\"]*\"/SERVER_VERSION = \"$VERSION\"/" heatpett_server.py

      - name: Build with PyInstaller
        run: pyinstaller --onedir --windowed --name="HeadpatServer" --icon=icon.png heatpett_server.py

      - name: Create AppDir
        run: |
          mkdir -p AppDir
          cp -r dist/HeadpatServer AppDir/HeadpatServer
          cp icon.png AppDir/icon.png

          cat > AppDir/headpat-server.desktop << 'EOF'
          [Desktop Entry]
          Name=Headpat Server
          Exec=AppRun
          Icon=icon
          Type=Application
          Categories=Utility;
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          if [ -n "$WAYLAND_DISPLAY" ] && [ -z "$DISPLAY" ]; then
              export DISPLAY=:0
          fi
          exec "$HERE/HeadpatServer/HeadpatServer" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool-extracted

      - name: Build AppImage
        run: ARCH=x86_64 ./appimagetool-extracted/AppRun AppDir HeadpatServer-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeadpatServer-Linux
          path: HeadpatServer-x86_64.AppImage

      - name: Create Release (Linux)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Headpat Server ${{ github.ref_name }}
          files: HeadpatServer-x86_64.AppImage
